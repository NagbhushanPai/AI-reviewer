services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_review
      POSTGRES_USER: ai_review
      POSTGRES_PASSWORD: ai_review
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    env_file:
      - ../.env
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - postgres
      - redis
    ports:
      - "3001:3001"

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    env_file:
      - ../.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data: